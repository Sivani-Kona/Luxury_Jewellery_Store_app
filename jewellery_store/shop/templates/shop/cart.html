{% extends 'shop/base.html' %} {% block content %}
<h2>Your Cart</h2>

{% for item in items %}
<div>
  <h3>{{ item.product.name }}</h3>

  <p>Quantity: {{ item.quantity }}</p>

  <p>Price: ₹{{ item.product.price }}</p>
</div>
{% endfor %}

<h2>Total: ₹{{ total }}</h2>

<a href="/checkout/">Proceed to Checkout</a>

{% endblock %}
